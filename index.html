<!DOCTYPE html>
<html lang="it">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AirOps – Gestione Turni</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            surface: '#1e293b',
            base: '#0f172a',
          }
        }
      }
    }
  </script>
  <style type="text/tailwindcss">
    @layer base {
      body { @apply bg-slate-900 text-slate-100 font-sans; }
      ::-webkit-scrollbar { @apply w-1.5; }
      ::-webkit-scrollbar-track { @apply bg-slate-800; }
      ::-webkit-scrollbar-thumb { @apply bg-slate-600 rounded; }
    }

  </style>
</head>

<body class="dark">
  <div id="app"></div>
  <script type="module" src="/src/main.js"></script>
</body>

</html>
